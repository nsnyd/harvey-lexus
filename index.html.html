*{box-sizing:border-box;margin:0;padding:0}
:root{

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:12px;line-height:1.5;min-height:100vh}
.hdr{background:var(--blue);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.logo{font-weight:700;font-size:15px;color:#fff;letter-spacing:-.3px}
.logo em{color:#93C5FD;font-style:normal}
.hdr-r{text-align:right}
.hdr-r strong{color:#fff;font-size:16px}
.hdr-r small{color:#BFDBFE;font-size:10px;display:block}
.mbar{background:#fff;border-bottom:2px solid var(--bdr);padding:6px 14px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.mbar::-webkit-scrollbar{display:none}
.mb{padding:4px 9px;border-radius:10px;border:1.5px solid var(--bdr2);background:transparent;color:var(--txt3);cursor:pointer;font-size:10px;font-weight:700;white-space:nowrap;transition:all .12s;line-height:1.4;text-align:center}
.mb.on{background:var(--blue);border-color:var(--blue);color:#fff}
.mb.hit{background:var(--gn-bg);border-color:#86EFAC;color:var(--grn)}
.mb.miss{background:var(--rd-bg);border-color:#FCA5A5;color:var(--red)}
.tbar{display:flex;background:#fff;border-bottom:2px solid var(--bdr);padding:0 14px}
.tb{padding:9px 13px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--txt3);border-bottom:3px solid transparent;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;margin-bottom:-2px}
.tb.on{color:var(--blue);border-bottom-color:var(--blue)}
.pg{padding:12px 16px}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px;margin-bottom:12px}

.kv{font-size:21px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.ks{font-size:10px;color:var(--txt3);margin-top:3px}
.gn-txt{color:var(--grn)}.rd-txt{color:var(--red)}.bl-txt{color:var(--blue)}.mu-txt{color:var(--txt3)}
.card{background:#fff;border:1.5px solid var(--bdr);border-radius:6px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sec{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--txt3);margin:14px 0 7px}
.sec:first-child{margin-top:0}
table{width:100%;border-collapse:collapse;font-size:11px}
th{font-size:10px;font-weight:700;color:var(--txt3);padding:6px 7px;border-bottom:2px solid var(--bdr);text-align:right;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:var(--bg3)}
th.L{text-align:left}
td{padding:5px 7px;border-bottom:1px solid var(--bdr);text-align:right;color:var(--txt2)}
td.L{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
tfoot td{border-top:2px solid var(--bdr2);font-weight:700;color:var(--txt);border-bottom:none;background:var(--bg3)}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.bdg-gn{background:var(--gn-bg);color:var(--grn)}
.bdg-rd{background:var(--rd-bg);color:var(--red)}
.bdg-bl{background:var(--bl-bg);color:var(--blue)}
.bdg-am{background:var(--am-bg);color:var(--amb)}
.bar-outer{height:6px;border-radius:3px;background:var(--bdr);overflow:hidden;display:inline-block;vertical-align:middle}
.bar-inner{height:100%;border-radius:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.g2{grid-template-columns:1fr}}
.banner{background:var(--bl-bg);border:1.5px solid #93C5FD;border-radius:6px;padding:9px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.bni{font-size:12px;font-weight:700;color:var(--blue)}
.bnl{font-size:10px;color:var(--txt3);font-weight:400}
.pyrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr)}
.pyrow:last-child{border-bottom:none}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.fbtns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{padding:4px 10px;border-radius:10px;border:1.5px solid var(--bdr2);background:transparent;color:var(--txt3);cursor:pointer;font-size:10px;font-weight:700;transition:all .12s}
.fbtn.on{border-color:transparent;color:#fff}
.ch{position:relative;width:100%}
.ttbtn{padding:4px 11px;border-radius:10px;border:1.5px solid var(--bdr2);background:transparent;color:var(--txt3);cursor:pointer;font-size:10px;font-weight:700;transition:all .12s}
.ttbtn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.ttrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
tr[data-m]{cursor:pointer}
</style>
</head>

function f$(v){ return '$'+Math.round(Math.abs(v)).toLocaleString()+(v<0?' \u2193':''); }
function fp$(v){ return (v<0?'-':'')+f$(Math.abs(v)); }
function gc(v,g){ return v>=g?'gn-txt':'rd-txt'; }
function bar(v,max,c,h,w){
  var p=Math.min(100,Math.max(0,max?(v/max)*100:0));
  return '<span class="bar-outer" style="width:'+w+';height:'+h+'px"><span class="bar-inner" style="width:'+p.toFixed(1)+'%;background:'+c+'"></span></span>';
}

function ms(m){
  var deals=(ALL_DATA[m]||[]).filter(function(d){return d.status==='Delivered';});
  var u=deals.length;
  var f=deals.reduce(function(s,d){return s+(d.front||0);},0);
  var b=deals.reduce(function(s,d){return s+(d.back||0);},0);
  var t=f+b, rdr=RDR_COUNTS[m]||u, goal=ALL_GOALS[m]||40;
  return {u:u,f:f,b:b,t:t,fpvr:u?f/u:0,bpvr:u?b/u:0,tpvr:u?t/u:0,deals:deals,goal:goal,rdr:rdr};
}

function killCh(){
  Object.keys(CH).forEach(function(k){try{CH[k].destroy();}catch(e){}});
  CH={};
}

function repMap(deals){
  var rm={};
  deals.forEach(function(d){
    var reps=(d.rep&&d.rep.indexOf('/')>=0)?d.rep.split('/').map(function(r){return r.trim();}):[d.rep||'?'];
    reps.forEach(function(r){
      var w=reps.length>1?0.5:1;
      if(!rm[r])rm[r]={u:0,f:0,b:0};
      rm[r].u+=w; rm[r].f+=(d.front||0)*w; rm[r].b+=(d.back||0)*w;
    });
  });
  return Object.keys(rm).map(function(id){
    var v=rm[id], rep=REPS[id]||{n:id,c:'#64748B'};
    return {id:id,u:v.u,f:v.f,b:v.b,t:v.f+v.b,n:rep.n,c:rep.c};
  }).sort(function(a,b){return b.t-a.t;});
}

function banner(s){
  var ok=s.rdr>=s.goal, gap=s.u-s.rdr;
  var h='<div class="banner">';
  h+='<span class="bni"><span class="bnl">RDR\u00a0</span>'+s.rdr+' <span class="bnl">/ </span>'+s.goal;
  h+=' <span class="badge '+(ok?'bdg-gn':'bdg-rd')+'">'+(ok?'\u2713 HIT':s.rdr-s.goal)+'</span></span>';
  h+='<span class="bni"><span class="bnl">DMS delivered\u00a0</span>'+s.u+'</span>';
  if(gap)h+='<span class="bni"><span class="bnl">Not RDR\u2019d\u00a0</span>'+gap+' <span class="badge bdg-am">pending</span></span>';
  h+='<span class="bni"><span class="bnl">TPVR\u00a0</span>'+f$(s.tpvr);
  h+=' <span class="badge '+(s.tpvr>=GP.tp?'bdg-gn':'bdg-rd')+'">'+(s.tpvr>=GP.tp?'\u25b2':'▼')+'goal</span></span>';
  h+='</div>';
  return h;
}

function drawMbar(){
  var html='';
  MO.forEach(function(m){
    var s=ms(m), cls=m===CUR?'on':s.rdr>=s.goal?'hit':'miss';
    html+='<button class="mb '+cls+'" data-m="'+m+'" onclick="goM(this.dataset.m)">';
    html+=ML[m]+'<br><span style="font-size:9px;font-weight:400">'+s.rdr+'/'+s.goal+'</span></button>';
  });
  document.getElementById('mbar').innerHTML=html;
}

function drawTbar(){
  var html='';
  TABS.forEach(function(t){
    var id=t[0],lb=t[1];
    html+='<button class="tb'+(TAB===id?' on':'')+'" data-t="'+id+'" onclick="goT(this.dataset.t)">'+lb+'</button>';
  });
  document.getElementById('tbar').innerHTML=html;
}

function drawHdr(){
  var s=ms(CUR), gap=s.u-s.rdr;
  document.getElementById('h-sub').textContent=ML[CUR]+' \u00b7 goal '+s.goal;
  document.getElementById('h-units').textContent=s.rdr+'/'+s.goal+' RDR';

      pointBackgroundColor:vd.map(function(m){return mfn(m)>=(gl||0)?'#15803D':'#B91C1C';}),
      pointBorderColor:vd.map(function(m){return mfn(m)>=(gl||0)?'#15803D':'#B91C1C';})}];
    if(gl)ds.push({label:'Goal',data:vd.map(function(){return gl;}),borderColor:'#15803D',borderDash:[5,3],borderWidth:1.5,pointRadius:0,fill:false});
    CH.main=new Chart(c1,{type:'line',data:{labels:vd.map(function(m){return m.lb;}),datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:TM==='units',ticks:{callback:function(v){return TM==='units'?v:TM==='gross'?'$'+Math.round(v/1000)+'k':'$'+v.toLocaleString();}}}}}});
  }

  var c2=document.getElementById('cUnits');
  if(c2&&typeof Chart!=='undefined'){
    CH.units=new Chart(c2,{type:'bar',
      data:{labels:monthly.map(function(m){return m.lb;}),datasets:[
        {label:'RDR',data:monthly.map(function(m){return m.rdr;}),
         backgroundColor:monthly.map(function(m){return m.rdr>=m.goal?'rgba(21,128,61,.7)':'rgba(185,28,28,.6)';}),borderRadius:4},
        {label:'Goal',data:monthly.map(function(m){return m.goal;}),type:'line',
         borderColor:'rgba(100,116,139,.5)',borderDash:[4,3],borderWidth:1.5,pointRadius:0,fill:false},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:false,min:25,ticks:{stepSize:5}}}}});
  }

  var c3=document.getElementById('cRep');
  if(c3&&typeof Chart!=='undefined'){
    var ro=['KM','Deek','E$','BN','MO','JB','NS','Jonathan','OB','Robert'];
    CH.rep=new Chart(c3,{type:'bar',
      data:{labels:MO.map(function(m){return ML[m];}),datasets:ro.map(function(id){
        var r=REPS[id]||{n:id,c:'#94A3B8'};
        return {label:r.n||id,
          data:MO.map(function(m){
            return (ALL_DATA[m]||[]).filter(function(d){
              return d.status==='Delivered'&&(d.rep===id||(d.rep&&d.rep.indexOf(id)>=0));
            }).reduce(function(s,d){return s+(d.front||0)+(d.back||0);},0);
          }),
          backgroundColor:r.c+'BB',stack:'s',borderWidth:0};
      })},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},
        scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,
          ticks:{callback:function(v){return '$'+Math.round(v/1000)+'k';}}}}}});
  }
}

window.goM=function(m){CUR=m;RF='ALL';killCh();drawAll();};
window.goT=function(t){TAB=t;killCh();drawHdr();drawTbar();drawPage();};
window.setRF=function(v){RF=v;drawPage();};
window.setTV=function(v){TV=v;killCh();drawPage();};
window.setTM=function(v){TM=v;killCh();drawPage();};

function drawPage(){
  var pg=document.getElementById('pg');
  if(TAB==='db')pg.innerHTML=drawDB();
  else if(TAB==='dl')pg.innerHTML=drawDL();
  else if(TAB==='rp')pg.innerHTML=drawRP();
  else if(TAB==='tr'){pg.innerHTML=drawTR();setTimeout(drawCharts,120);}
}

function drawAll(){drawHdr();drawMbar();drawTbar();drawPage();}
drawAll();

</script>
</body>
</html>
