<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Lexus Sales Tracker</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f4;
  --color-background-tertiary: #eeede8;
  --color-background-info: #e6f1fb;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #6b6b66;
  --color-text-info: #0c447c;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-info: #85b7eb;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); font-size: 13px; color: var(--color-text-primary); background: #f8f7f4; padding: .75rem 1rem 2rem; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; color: var(--color-text-primary); display: flex; align-items: center; gap: 10px; }
h1 span { font-size: 12px; font-weight: 400; color: var(--color-text-secondary); background: #e1f5ee; color: #085041; padding: 2px 8px; border-radius: 4px; }
.app { width: 100%; margin: 0; padding: 0 .5rem; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; flex-wrap: wrap; gap: 8px; }
.tabs { display: flex; gap: 3px; border-bottom: .5px solid var(--color-border-tertiary); flex-wrap: wrap; }
.tab { padding: 5px 13px; font-size: 12px; border: .5px solid transparent; border-bottom: none; border-radius: 5px 5px 0 0; cursor: pointer; background: transparent; color: var(--color-text-secondary); }
.tab.active { background: var(--color-background-primary); border-color: var(--color-border-tertiary); color: var(--color-text-primary); font-weight: 500; margin-bottom: -1px; }
.section { display: none; } .section.active { display: block; }
.month-sel { display: flex; align-items: center; gap: 8px; }
.month-sel select { padding: 5px 8px; font-size: 12px; font-weight: 500; border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.month-badge { font-size: 11px; color: var(--color-text-secondary); }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 7px; margin-bottom: .85rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 9px 11px; }
.metric-label { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .03em; }
.metric-value { font-size: 20px; font-weight: 500; }
.metric-sub { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }
.mv-green { color: #1D9E75; } .mv-blue { color: #185FA5; } .mv-amber { color: #BA7517; } .mv-red { color: #D85A30; }
.pace-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 7px; margin-bottom: .85rem; }
.pace-card { background: var(--color-background-primary); border: .5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 11px 13px; }
.pace-title { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
.pace-nums { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.pace-actual { font-size: 18px; font-weight: 500; } .pace-goal { font-size: 10px; color: var(--color-text-secondary); }
.bar-wrap { background: var(--color-background-secondary); border-radius: 3px; height: 6px; overflow: hidden; }
.bar { height: 6px; border-radius: 3px; }
.rep-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 5px; margin-bottom: .85rem; }
.rep-card { border-radius: var(--border-radius-md); padding: 8px 10px; border: .5px solid transparent; }
.rep-name { font-size: 11px; font-weight: 500; margin-bottom: 1px; }
.rep-stats { font-size: 10px; opacity: .85; }
.btn { padding: 5px 12px; font-size: 12px; border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
.btn-save { background: #E1F5EE; color: #085041; border-color: #0F6E56; }
.form-panel { background: var(--color-background-primary); border: .5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; margin-bottom: .85rem; }
.form-panel.editing { border-color: #1D9E75; background: #F7FDFB; }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 7px; margin-bottom: 7px; }
.fg { display: flex; flex-direction: column; gap: 2px; }
.fg label { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .03em; }
.fg input, .fg select { padding: 6px 8px; font-size: 13px; border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.form-actions { display: flex; gap: 7px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
.edit-indicator { font-size: 11px; color: #0F6E56; font-weight: 500; }
.tbl-wrap { overflow-x: auto; border: .5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-top: .6rem; max-height: 70vh; overflow-y: auto; }
.tbl-wrap th { position: sticky; top: 0; z-index: 1; background: var(--color-background-secondary); }
th { resize: horizontal; overflow: auto; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--color-background-secondary); padding: 7px 10px; text-align: left; font-weight: 500; font-size: 11px; color: var(--color-text-secondary); border-bottom: .5px solid var(--color-border-tertiary); white-space: nowrap; text-transform: uppercase; letter-spacing: .03em; }
td { padding: 7px 10px; border-bottom: .5px solid var(--color-border-tertiary); color: var(--color-text-primary); white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
tr.editing-row td { background: #F0FBF7; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.row-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 3px; color: var(--color-text-secondary); }
.row-btn:hover { background: var(--color-background-secondary); }
.row-btn.edit-btn:hover { color: #185FA5; }
.row-btn.del-btn:hover { color: #D85A30; }
.section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; flex-wrap: wrap; gap: 6px; }
.section-title { font-size: 15px; font-weight: 500; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .75rem; align-items: center; }
.filter-row select, .filter-row input { padding: 5px 8px; font-size: 12px; border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.goal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 7px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; margin-bottom: .85rem; }
.goal-item { display: flex; flex-direction: column; gap: 3px; }
.goal-item label { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .03em; }
.goal-item input { padding: 5px 8px; font-size: 13px; border: .5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.cum-num { font-weight: 500; color: #185FA5; }
.neg { color: #D85A30; } .pos { color: #1D9E75; }
.presold-row td { background: rgba(29,158,117,0.05); }
.goal-note { font-size: 11px; color: var(--color-text-secondary); margin-bottom: .6rem; font-style: italic; }
.hist-note { font-size: 11px; color: var(--color-text-secondary); padding: 8px 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin-bottom: .6rem; }
tr.dash-row { cursor: pointer; }
tr.dash-row:hover td { background: #EEF6FF; }
tr.dash-row.qe-active td { background: #F0FBF7; font-weight: 500; }
tr.qe-row td { padding: 0; background: #F7FDFB; border-bottom: 2px solid #1D9E75; }
.qe-panel { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
.qe-fg { display: flex; flex-direction: column; gap: 2px; }
.qe-fg label { font-size: 10px; color: #0F6E56; text-transform: uppercase; letter-spacing: .04em; font-weight: 500; }
.qe-fg input, .qe-fg select { padding: 5px 8px; font-size: 12px; border: 1px solid #5DCAA5; border-radius: 6px; background: #fff; color: #1a1a18; min-width: 90px; }
.qe-fg input[type=number] { min-width: 80px; }
.qe-actions { display: flex; gap: 6px; align-items: center; margin-left: 4px; }
.qe-save { padding: 6px 14px; font-size: 12px; font-weight: 500; background: #1D9E75; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
.qe-save:hover { background: #0F6E56; }
.qe-cancel { padding: 6px 10px; font-size: 12px; background: transparent; border: 1px solid #B4B2A9; border-radius: 6px; cursor: pointer; color: #5F5E5A; }
.qe-cancel:hover { background: #F1EFE8; }
</style>
</head>
<body>
<div class="app">
<h1>Harvey Lexus <span id="month-badge">live</span></h1>

<div class="top-bar">
  <div class="month-sel">
    <select id="month-picker" onchange="switchMonth(this.value)">
      <option value="2026-04" selected>April 2026 (current)</option>
      <option value="2026-03">March 2026</option>
      <option value="2026-02">February 2026</option>
      <option value="2026-01">January 2026</option>
      <option value="2025-12">December 2025</option>
      <option value="2025-11">November 2025</option>
      <option value="2025-10">October 2025</option>
      <option value="2025-09">September 2025</option>
      <option value="2025-08">August 2025</option>
      <option value="2025-07">July 2025</option>
      <option value="2025-06">June 2025</option>
      <option value="2025-05">May 2025</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <div class="tabs" id="main-tabs">
      <button class="tab active" onclick="switchTab('dashboard',this)">Dashboard</button>
      <button class="tab" onclick="switchTab('deals',this)">Deal log</button>
      <button class="tab" onclick="switchTab('inventory',this)">Inventory</button>
      <button class="tab" onclick="switchTab('goals',this)">Goals & pace</button>
    </div>
    <div style="display:flex;gap:5px;margin-left:8px;padding-bottom:1px">
      <button class="btn" onclick="exportData()" title="Download your deal data as a backup file" style="font-size:11px;padding:3px 10px;background:#E1F5EE;color:#085041;border-color:#0F6E56">⬇ Export</button>
      <button class="btn" onclick="document.getElementById('import-file').click()" title="Load a previously exported backup file" style="font-size:11px;padding:3px 10px">⬆ Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
    </div>
  </div>
</div>

<div id="tab-dashboard" class="section active">
  <div id="dash-metrics" class="metrics"></div>
  <div id="dash-pace" class="pace-grid"></div>
  <div class="section-hdr"><span class="section-title" id="dash-rep-title">Rep breakdown</span></div>
  <div id="dash-reps" class="rep-grid"></div>
  <div class="tbl-wrap"><table>
    <thead id="dash-thead"><tr></tr></thead>
    <tbody id="dash-tbody"></tbody>
  </table></div>
</div>

<div id="tab-deals" class="section">
  <div id="hist-banner" class="hist-note" style="display:none"></div>
  <div id="deal-form-wrap">
  <div class="section-hdr"><span class="section-title" id="deal-form-title">Add a deal</span></div>
  <div class="form-panel" id="deal-form-panel">
    <div class="form-row">
      <div class="fg"><label>RDR date</label><input type="date" id="f-rdr"></div>
      <div class="fg"><label>Customer</label><input type="text" id="f-cust" placeholder="Last, First"></div>
      <div class="fg"><label>Rep</label><select id="f-rep"></select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Model</label><select id="f-model">
        <option value="">— select —</option>
        <option>9411 — RX 350 Premium</option><option>9412 — RX 350+</option><option>9413 — RX 350 Luxury</option>
        <option>9414 — RX 350h</option><option>9415 — RX 350 F Sport</option><option>9443 — RX 450h+</option>
        <option>9451 — NX 350h Premium</option><option>9452 — NX 350h+</option><option>9453 — RX 350h Luxury</option>
        <option>9455 — RX 350h F Sport</option><option>9458 — RX 500h</option>
        <option>9353 — TX 350 Premium</option><option>9355 — TX 350 Luxury</option><option>9357 — TX 550h+</option><option>9360 — TX 500h</option>
        <option>9508 — IS 350 F Sport Design</option><option>9516 — IS 350 F Sport</option>
        <option>9606 — RZ 450e</option><option>9623 — LX 600 Luxury</option><option>9626 — LX 700h</option>
        <option>9702 — GX 550 Premium+</option><option>9704 — GX 550 Luxury+</option><option>9706 — GX 550 Overtrail+</option>
        <option>9733 — UX 300h</option><option>9735 — UX 300h F Sport</option>
        <option>9834 — NX 350 AWD</option><option>9835 — NX 350 Premium</option><option>9836 — NX 350 Luxury</option>
        <option>9844 — NX 350h</option><option>9845 — NX 350h Premium</option><option>9846 — NX 350h Luxury</option>
        <option>9852 — NX 450h+</option><option>9855 — NX 450h+ Premium</option>
        <option>9262 — LC 500</option><option>9902 — RZ 350e</option><option>9000 — other</option>
      </select></div>
      <div class="fg"><label>Stk#</label><input type="text" id="f-stk" placeholder="26RH243"></div>
      <div class="fg"><label>VIN (last 8)</label><input type="text" id="f-vin" placeholder="SC088825"></div>
      <div class="fg"><label>Status</label>
        <select id="f-status"><option>Delivered</option><option>Scheduled</option><option>Unscheduled</option><option>Freight</option><option>Allocated</option><option>Trade</option><option>Outside</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Term</label><select id="f-term"><option>Finance</option><option>Cash</option><option>Lease</option><option>Outside lien</option></select></div>
      <div class="fg"><label>Front gross ($)</label><input type="number" id="f-front" placeholder="0"></div>
      <div class="fg"><label>Back gross ($)</label><input type="number" id="f-back" placeholder="0"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Trade?</label><select id="f-trade"><option value="No">No</option><option value="Yes">Yes</option></select></div>
      <div class="fg"><label>Del date</label><input type="date" id="f-del"></div>
      <div class="fg"><label>ETA</label><input type="date" id="f-eta"></div>
      <div class="fg"><label>Comments</label><input type="text" id="f-comments" placeholder="Notes..."></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="deal-submit-btn" onclick="submitDeal()">Add deal</button>
      <button class="btn" onclick="cancelDealEdit()">Clear</button>
      <span class="edit-indicator" id="deal-edit-indicator" style="display:none">Editing deal — save to update</span>
    </div>
  </div>
  </div>
  <div class="filter-row">
    <select id="fil-status" onchange="renderDeals()"><option value="">All statuses</option><option>Delivered</option><option>Scheduled</option><option>Unscheduled</option><option>Freight</option><option>Allocated</option><option>Trade</option><option>Outside</option></select>
    <select id="fil-rep" onchange="renderDeals()"><option value="">All reps</option></select>
    <input type="text" id="fil-search" placeholder="Search customer / stk..." oninput="renderDeals()" style="min-width:180px">
  </div>
  <div class="tbl-wrap"><table>
    <thead id="deals-thead"><tr></tr></thead>
    <tbody id="deals-tbody"></tbody>
  </table></div>
</div>

<div id="tab-inventory" class="section">
  <div class="section-hdr">
    <span class="section-title">Inventory</span>
    <button class="btn" onclick="toggleInvForm()">+ Add unit</button>
  </div>
  <div id="inv-form" style="display:none">
    <div class="form-panel" id="inv-form-panel">
      <div class="form-row">
        <div class="fg"><label>Stk#</label><input type="text" id="i-stk" placeholder="26RH243"></div>
        <div class="fg"><label>VIN (last 8)</label><input type="text" id="i-vin" placeholder="SC088825"></div>
        <div class="fg"><label>Model</label><input type="text" id="i-model" placeholder="9452 — NX 350h+"></div>
        <div class="fg"><label>Status</label><select id="i-status"><option>Ground</option><option>Freight</option><option>Allocated</option></select></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>ETA</label><input type="date" id="i-eta"></div>
        <div class="fg"><label>Assigned customer</label><input type="text" id="i-cust" placeholder="Last, First"></div>
        <div class="fg"><label>Assigned rep</label><select id="i-rep"></select></div>
        <div class="fg"><label>Notes</label><input type="text" id="i-notes" placeholder="pre-sold, available..."></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="inv-submit-btn" onclick="submitInventory()">Add unit</button>
        <button class="btn" onclick="cancelInvEdit()">Clear</button>
        <span class="edit-indicator" id="inv-edit-indicator" style="display:none">Editing unit — save to update</span>
      </div>
    </div>
  </div>
  <div id="inv-summary" style="display:flex;gap:7px;margin-bottom:.75rem;flex-wrap:wrap"></div>
  <div class="filter-row">
    <select id="i-fil-status" onchange="renderInventory()"><option value="">All</option><option>Ground</option><option>Freight</option><option>Allocated</option></select>
    <select id="i-fil-rep" onchange="renderInventory()"><option value="">All reps</option></select>
    <input type="text" id="i-fil-search" placeholder="Search stk / VIN / model..." oninput="renderInventory()" style="min-width:160px">
    <label style="font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px"><input type="checkbox" id="i-fil-presold" onchange="renderInventory()"> Pre-sold only</label>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Status</th><th>Stk#</th><th>VIN</th><th>Model</th><th>ETA</th><th>Rep</th><th>Customer</th><th>Notes</th><th></th></tr></thead>
    <tbody id="inv-tbody"></tbody>
  </table></div>
</div>

<div id="tab-goals" class="section">
  <div class="section-hdr"><span class="section-title" id="goals-title">Goals & pace</span></div>
  <p class="goal-note" id="goals-note"></p>
  <div class="goal-grid" id="goals-grid"></div>
  <div id="goals-pace" class="pace-grid"></div>
</div>
</div>

<script>
const REPS=[
  {init:'OB',name:'Oliver Bokma',  bg:'#EEEDFE',tc:'#3C3489',bc:'#534AB7'},
  {init:'JB',name:'Joseph Booher', bg:'#E1F5EE',tc:'#085041',bc:'#0F6E56'},
  {init:'KM',name:'Kendra McClelland',bg:'#E6F1FB',tc:'#0C447C',bc:'#185FA5'},
  {init:'MO',name:"Mark O'Neil",   bg:'#FAEEDA',tc:'#854F0B',bc:'#BA7517'},
  {init:'BN',name:'Brian Nguyen',  bg:'#FBEAF0',tc:'#72243E',bc:'#993556'},
  {init:'E$',name:'Eddy Ademovic', bg:'#EAF3DE',tc:'#27500A',bc:'#3B6D11'},
  {init:'Deek',name:'Aaron Dekema',bg:'#FAECE7',tc:'#712B13',bc:'#993C1D'},
  {init:'JL',name:'Jonathon Leese',bg:'#F1EFE8',tc:'#444441',bc:'#5F5E5A'},
  {init:'NS',name:'Nicholas Snyder',bg:'#E6F1FB',tc:'#042C53',bc:'#0C447C'},
  {init:'RS',name:'RS',bg:'#F1EFE8',tc:'#444441',bc:'#888'},
];
const STC={Delivered:{bg:'#2C2C2A',tc:'#D3D1C7'},Scheduled:{bg:'#1D9E75',tc:'#E1F5EE'},Unscheduled:{bg:'#D85A30',tc:'#FAECE7'},Freight:{bg:'#BA7517',tc:'#FAEEDA'},Allocated:{bg:'#185FA5',tc:'#E6F1FB'},Trade:{bg:'#BA7517',tc:'#FAEEDA'},Outside:{bg:'#534AB7',tc:'#EEEDFE'},Ground:{bg:'#EAF3DE',tc:'#3B6D11'}};
const ISC={Ground:{bg:'#EAF3DE',tc:'#3B6D11'},Freight:{bg:'#FAEEDA',tc:'#854F0B'},Allocated:{bg:'#E6F1FB',tc:'#185FA5'}};
function ri(x){return REPS.find(r=>r.init===x)||{init:x,name:x,bg:'#F1EFE8',tc:'#444',bc:'#888'};}
function repTag(x){if(!x)return '';const r=ri(x);return `<span class="tag" style="background:${r.bg};color:${r.tc}">${r.init}</span>`;}
function stTag(s){const c=STC[s]||{bg:'#D3D1C7',tc:'#2C2C2A'};return `<span class="tag" style="background:${c.bg};color:${c.tc}">${s}</span>`;}
function fmt$(n){if(n===null||n===undefined||n==='')return '';const v=Math.round(n);return(v<0?'-$':'$')+Math.abs(v).toLocaleString();}
function today(){return new Date().toISOString().slice(0,10);}
function pb(a,g,c){const p=g>0?Math.min(100,Math.round(a/g*100)):0;return `<div class="bar-wrap"><div class="bar" style="width:${p}%;background:${c}"></div></div>`;}
function nr(s){if(!s||s==='nan')return '';s=s.trim();const m={'RS':'RS','KM':'KM','BN':'BN','MO':'MO','E$':'E$','JL':'JL','JB':'JB','NS':'NS','Deek':'Deek','OB':'OB','Deek ':'Deek'};return m[s]||s;}

// Status sort order: Delivered first, then Scheduled, Unscheduled, Freight, Allocated, Trade, Outside, everything else
const STATUS_ORDER={Delivered:0,Scheduled:1,Unscheduled:2,Trade:3,Freight:4,Allocated:5,Outside:6};
function statusRank(s){return STATUS_ORDER[s]!==undefined?STATUS_ORDER[s]:99;}

// Sort state for deal log and dashboard
let dealSort={col:'status',dir:1}; // dir: 1=asc, -1=desc
let dashSort={col:'status',dir:1};

function sortDeals(col){
  if(dealSort.col===col){dealSort.dir*=-1;}else{dealSort.col=col;dealSort.dir=1;}
  renderDeals();
}
function sortDash(col){
  if(dashSort.col===col){dashSort.dir*=-1;}else{dashSort.col=col;dashSort.dir=1;}
  renderDashboard();
}

function applySortDeals(arr){
  const {col,dir}=dealSort;
  return [...arr].sort((a,b)=>{
    let av,bv;
    if(col==='status'){av=statusRank(a.status);bv=statusRank(b.status);}
    else if(col==='rdr'){av=a.rdr||'';bv=b.rdr||'';}
    else if(col==='date'){av=a.date||'';bv=b.date||'';}
    else if(col==='del'){av=a.del||'';bv=b.del||'';}
    else if(col==='cust'){av=(a.cust||'').toLowerCase();bv=(b.cust||'').toLowerCase();}
    else if(col==='rep'){av=a.rep||'';bv=b.rep||'';}
    else if(col==='front'){av=a.front||0;bv=b.front||0;}
    else if(col==='back'){av=a.back||0;bv=b.back||0;}
    else if(col==='total'){av=(a.front||0)+(a.back||0);bv=(b.front||0)+(b.back||0);}
    else if(col==='term'){av=a.term||'';bv=b.term||'';}
    else if(col==='stk'){av=a.stk||'';bv=b.stk||'';}
    else if(col==='eta'){av=a.eta||'';bv=b.eta||'';}
    else{av=a[col]||'';bv=b[col]||'';}
    if(av<bv)return -1*dir;if(av>bv)return 1*dir;return 0;
  });
}
function applySortDash(arr){
  const {col,dir}=dashSort;
  return [...arr].sort((a,b)=>{
    let av,bv;
    if(col==='status'){av=statusRank(a.status);bv=statusRank(b.status);}
    else if(col==='rdr'){av=a.rdr||'';bv=b.rdr||'';}
    else if(col==='del'){av=(a.del||a.rdr||'');bv=(b.del||b.rdr||'');}
    else if(col==='cust'){av=(a.cust||'').toLowerCase();bv=(b.cust||'').toLowerCase();}
    else if(col==='rep'){av=a.rep||'';bv=b.rep||'';}
    else if(col==='front'){av=a.front||0;bv=b.front||0;}
    else if(col==='back'){av=a.back||0;bv=b.back||0;}
    else if(col==='total'){av=(a.front||0)+(a.back||0);bv=(b.front||0)+(b.back||0);}
    else if(col==='stk'){av=a.stk||'';bv=b.stk||'';}
    else{av=a[col]||'';bv=b[col]||'';}
    if(av<bv)return -1*dir;if(av>bv)return 1*dir;return 0;
  });
}
function thD(label,col){const active=dealSort.col===col;const arrow=active?(dealSort.dir===1?' ▲':' ▼'):'';return `<th onclick="sortDeals('${col}')" style="cursor:pointer;user-select:none${active?';color:#185FA5':''}">${label}${arrow}</th>`;}
function thDash(label,col){const active=dashSort.col===col;const arrow=active?(dashSort.dir===1?' ▲':' ▼'):'';return `<th onclick="sortDash('${col}')" style="cursor:pointer;user-select:none${active?';color:#185FA5':''}">${label}${arrow}</th>`;}

function loadMonth(m){
  if(m==='2026-04'){
    // Try localStorage first (has user edits), fall back to seed
    try{
      const saved=localStorage.getItem('hlf_deals_apr');
      if(saved){
        const savedDeals=JSON.parse(saved);
        // Only use localStorage if it has at least as many deals as seed
        // and has deals from this month
        if(savedDeals.length>=APRIL_SEED.length){
          deals=savedDeals;
        }else{
          deals=JSON.parse(JSON.stringify(APRIL_SEED));
        }
      }else{
        deals=JSON.parse(JSON.stringify(APRIL_SEED));
      }
    }catch(e){deals=JSON.parse(JSON.stringify(APRIL_SEED));}
    try{inv=JSON.parse(localStorage.getItem('hlf_inv_apr')||'null')||JSON.parse(JSON.stringify(APRIL_INV));}catch(e){inv=JSON.parse(JSON.stringify(APRIL_INV));}
    if(!inv.length)inv=JSON.parse(JSON.stringify(APRIL_INV));
    try{const g=JSON.parse(localStorage.getItem('hlf_goals_apr')||'null');if(g)goals=g;else goals=getGoals(m);}catch(e){goals=getGoals(m);}
  }else if(m==='2026-03'){
    // Load from localStorage if available, otherwise use seed
    // Seed is master - always load from seed
    deals=JSON.parse(JSON.stringify(MARCH_SEED));
    // Apply user edits from localStorage for existing deals
    try{
      const saved=localStorage.getItem('hlf_deals');
      if(saved){
        const savedDeals=JSON.parse(saved);
        const seedIds=new Set(deals.map(d=>d.id));
        const seedStks=new Set(deals.filter(d=>d.stk).map(d=>d.stk));
        // Update existing seed deals with user edits
        deals.forEach(d=>{
          const s=savedDeals.find(x=>x.id===d.id)||(d.stk?savedDeals.find(x=>x.stk===d.stk):null);
          if(s){
            if(d.status==='Delivered'||d.status==='Outside'){
              // Lock delivered status, only update financials/comments
              if(s.front!==0)d.front=s.front;
              if(s.back!==0)d.back=s.back;
              if(s.term)d.term=s.term;
              if(s.trade)d.trade=s.trade;
              if(s.comments)d.comments=s.comments;
              if(s.rdr)d.rdr=s.rdr;
              if(s.rdrPrev)d.rdrPrev=s.rdrPrev;
            } else {
              // Pipeline: take user edits but keep seed cust/rep/stk
              const cust=d.cust,rep=d.rep,stk=d.stk,id=d.id;
              Object.assign(d,s);
              d.id=id;d.stk=stk||s.stk;d.cust=cust;d.rep=rep;
            }
          }
        });
        // Add truly new user-added deals (not in seed)
        savedDeals.forEach(s=>{
          const inSeed=seedIds.has(s.id)||(s.stk&&seedStks.has(s.stk));
          if(!inSeed)deals.push(s);
        });
      }
    }catch(e){}
    saveMarch();
    try{inv=JSON.parse(localStorage.getItem('hlf_inv')||'null')||JSON.parse(JSON.stringify(MARCH_INV));}catch(e){inv=JSON.parse(JSON.stringify(MARCH_INV));}
    if(!inv.length)inv=JSON.parse(JSON.stringify(MARCH_INV));
    try{const g=JSON.parse(localStorage.getItem('hlf_goals')||'null');if(g)goals=g;else goals=getGoals(m);}catch(e){goals=getGoals(m);}
  }else if(HIST[m]){deals=JSON.parse(JSON.stringify(HIST[m]||[]));inv=[];goals=getGoals(m);}else{deals=[];inv=[];goals=getGoals(m);}
}
function saveMarch(){
  try{
    if(curMonth==='2026-03'){
      localStorage.setItem('hlf_deals',JSON.stringify(deals));
      localStorage.setItem('hlf_inv',JSON.stringify(inv));
    }else if(curMonth==='2026-04'){
      localStorage.setItem('hlf_deals_apr',JSON.stringify(deals));
      localStorage.setItem('hlf_inv_apr',JSON.stringify(inv));
    }
  }catch(e){console.warn('Save failed:',e);}

    const t=d.front+d.back,isEditing=d.id===editingDealId||String(d.id)===String(editingDealId);
    return `<tr class="${isEditing?'editing-row':''}"><td>${d.rdr||''}</td><td>${d.del?(d.status==='Delivered'||d.status==='Outside'?d.del:`<span style="background:#FAEEDA;color:#854F0B;padding:1px 5px;border-radius:3px;font-weight:500">${d.del}</span>`):''}</td><td>${d.cust}</td><td style="font-size:11px">${d.model||''}</td><td>${d.stk||''}</td><td style="font-size:11px">${d.vin||''}</td><td>${repTag(d.rep)}</td><td>${stTag(d.status)}</td><td style="font-size:11px">${d.term||''}</td><td class="${d.front<0?'neg':d.front>0?'pos':''}">${d.front?fmt$(d.front):''}</td><td>${d.back?fmt$(d.back):(d.status==='Delivered'||d.status==='Outside'?'$0':'')}</td><td style="font-weight:500" class="${t<0?'neg':t>0?'pos':''}">${t?fmt$(t):''}</td><td>${d.trade==='Yes'?'<span class="tag" style="background:#FAEEDA;color:#854F0B">T</span>':''}</td><td style="font-size:11px">${d.eta||''}</td><td style="color:#888;font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${d.comments||''}</td><td style="white-space:nowrap">${isCurrent?`<button class="row-btn edit-btn" onclick="editDeal('${d.id}')" title="Edit">✎</button><button class="row-btn del-btn" onclick="deleteDeal('${d.id}')" title="Delete">✕</button>`:''}</td></tr>`;
  }).join('')||`<tr><td colspan="15" style="text-align:center;padding:2rem;color:#888">No deals match filter</td></tr>`;
}

function renderInventory(){
  const sf=gv('i-fil-status'),rf=gv('i-fil-rep'),q=document.getElementById('i-fil-search').value.toLowerCase(),psOnly=document.getElementById('i-fil-presold').checked;
  let f=[...inv];
  if(sf)f=f.filter(u=>u.status===sf);if(rf)f=f.filter(u=>u.rep===rf);if(q)f=f.filter(u=>(u.stk+u.vin+u.model).toLowerCase().includes(q));if(psOnly)f=f.filter(u=>u.notes&&u.notes.toUpperCase().includes('SOLD'));
  const g=inv.filter(u=>u.status==='Ground').length,fr=inv.filter(u=>u.status==='Freight').length,al=inv.filter(u=>u.status==='Allocated').length,ps=inv.filter(u=>u.notes&&u.notes.toUpperCase().includes('SOLD')).length;
  const isCurrent=curMonth==='2026-03'||curMonth==='2026-04';
  document.getElementById('inv-summary').innerHTML=`
    <div class="metric" style="min-width:80px"><div class="metric-label">Ground</div><div class="metric-value mv-green">${g}</div></div>
    <div class="metric" style="min-width:80px"><div class="metric-label">Freight</div><div class="metric-value mv-amber">${fr}</div></div>
    <div class="metric" style="min-width:80px"><div class="metric-label">Allocated</div><div class="metric-value mv-blue">${al}</div></div>
    <div class="metric" style="min-width:80px"><div class="metric-label">Total</div><div class="metric-value">${g+fr+al}</div></div>
    <div class="metric" style="min-width:80px"><div class="metric-label">Pre-sold</div><div class="metric-value mv-green">${ps}</div></div>
    <div class="metric" style="min-width:80px"><div class="metric-label">Available</div><div class="metric-value">${g+fr+al-ps}</div></div>
  `;
  document.getElementById('inv-tbody').innerHTML=f.length?f.map(u=>{
    const sc=ISC[u.status]||{bg:'#F1EFE8',tc:'#5F5E5A'},presold=u.notes&&u.notes.toUpperCase().includes('SOLD'),isEditing=u.id===editingInvId;
    return `<tr class="${presold?'presold-row':''} ${isEditing?'editing-row':''}"><td><span class="tag" style="background:${sc.bg};color:${sc.tc}">${u.status}</span></td><td style="font-weight:500">${u.stk||'—'}</td><td style="font-size:11px">${u.vin||''}</td><td style="font-size:12px">${u.model||''}</td><td>${u.eta||''}</td><td>${u.rep?repTag(u.rep):''}</td><td style="font-size:12px">${u.cust||''}</td><td style="color:#888;font-size:11px">${u.notes||''}</td><td style="white-space:nowrap">${isCurrent?`<button class="row-btn edit-btn" onclick="editInv(${u.id})" title="Edit">✎</button><button class="row-btn del-btn" onclick="deleteInv(${u.id})" title="Delete">✕</button>`:''}</td></tr>`;
  }).join(''):`<tr><td colspan="9" style="text-align:center;padding:2rem;color:#888">No inventory data for this month</td></tr>`;
}

function renderGoals(){
  document.getElementById('goals-title').textContent=(MONTH_LABELS[curMonth]||curMonth)+' goals';
  const note=MONTH_GOALS[curMonth]?.note||'';
  document.getElementById('goals-note').textContent=note;
  document.getElementById('goals-note').style.display=note?'block':'none';
  const isCurrent=curMonth==='2026-03'||curMonth==='2026-04';
  document.getElementById('goals-grid').innerHTML=`
    <div class="goal-item"><label>Delivered (internal)</label><input type="number" id="g-del" value="${goals.del}" ${isCurrent?'onchange="saveGoals()"':'readonly'}></div>
    <div class="goal-item"><label>RDR (Lexus)</label><input type="number" id="g-rdr" value="${goals.rdr}" ${isCurrent?'onchange="saveGoals()"':'readonly'}></div>
    <div class="goal-item"><label>Front PVR goal ($)</label><input type="number" id="g-fpvr" value="${goals.fpvr}" ${isCurrent?'onchange="saveGoals()"':'readonly'}></div>
    <div class="goal-item"><label>Back PVR goal ($)</label><input type="number" id="g-bpvr" value="${goals.bpvr}" ${isCurrent?'onchange="saveGoals()"':'readonly'}></div>
    <div class="goal-item"><label>Total gross goal ($)</label><input type="number" id="g-gross" value="${goals.gross}" ${isCurrent?'onchange="saveGoals()"':'readonly'}></div>
  `;
  const del=deals.filter(d=>(d.status==='Delivered'||d.status==='Outside')&&(d.del||d.rdr||'').slice(0,7)===curMonth),
        rdrC=deals.filter(d=>d.rdr&&d.rdr.slice(0,7)===curMonth&&d.status!=='Outside'&&!d.rdrPrev).length,n=del.length||1;
  const tg=del.reduce((s,d)=>s+d.front+d.back,0),fg=del.reduce((s,d)=>s+d.front,0),bg=del.reduce((s,d)=>s+d.back,0);
  document.getElementById('goals-pace').innerHTML=`
    <div class="pace-card"><div class="pace-title">Delivered (${del.length} / ${goals.del})</div><div class="pace-nums"><span class="pace-actual">${del.length}</span><span class="pace-goal">goal ${goals.del}</span></div>${pb(del.length,goals.del,'#1D9E75')}</div>
    <div class="pace-card"><div class="pace-title">RDR (${rdrC} / ${goals.rdr})</div><div class="pace-nums"><span class="pace-actual">${rdrC}</span><span class="pace-goal">goal ${goals.rdr}</span></div>${pb(rdrC,goals.rdr,'#185FA5')}</div>
    <div class="pace-card"><div class="pace-title">Total gross</div><div class="pace-nums"><span class="pace-actual">${fmt$(tg)}</span><span class="pace-goal">${fmt$(goals.gross)}</span></div>${pb(tg,goals.gross,'#534AB7')}</div>
    <div class="pace-card"><div class="pace-title">Front PVR</div><div class="pace-nums"><span class="pace-actual">${fmt$(fg/n)}</span><span class="pace-goal">goal ${fmt$(goals.fpvr)}</span></div>${pb(fg/n,goals.fpvr,'#BA7517')}</div>
    <div class="pace-card"><div class="pace-title">Back PVR</div><div class="pace-nums"><span class="pace-actual">${fmt$(bg/n)}</span><span class="pace-goal">goal ${fmt$(goals.bpvr)}</span></div>${pb(bg/n,goals.bpvr,'#993C1D')}</div>
    <div class="pace-card"><div class="pace-title">Total PVR</div><div class="pace-nums"><span class="pace-actual">${fmt$(tg/n)}</span><span class="pace-goal">goal ${fmt$(goals.fpvr+goals.bpvr)}</span></div>${pb(tg/n,goals.fpvr+goals.bpvr,'#0F6E56')}</div>
  `;
}

function exportData(){
  const payload={deals,inv,goals,exported:new Date().toISOString(),month:curMonth};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='harvey_lexus_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const payload=JSON.parse(e.target.result);
      if(payload.deals&&Array.isArray(payload.deals)){
        deals=payload.deals;
        const month=payload.month||curMonth;
        if(month==='2026-04'){
          localStorage.setItem('hlf_deals_apr',JSON.stringify(deals));
        }else{
          localStorage.setItem('hlf_deals',JSON.stringify(deals));
        }
        curMonth=month;
        document.getElementById('month-picker').value=month;
      }
      if(payload.inv&&Array.isArray(payload.inv)){
        inv=payload.inv;
        const month=payload.month||curMonth;
        if(month==='2026-04'){
          localStorage.setItem('hlf_inv_apr',JSON.stringify(inv));
        }else{
          localStorage.setItem('hlf_inv',JSON.stringify(inv));
        }
      }
      if(payload.goals){
        goals=payload.goals;
        const month=payload.month||curMonth;
        if(month==='2026-04'){
          localStorage.setItem('hlf_goals_apr',JSON.stringify(goals));
        }else{
          localStorage.setItem('hlf_goals',JSON.stringify(goals));
        }
      }
      input.value='';
      renderAll();
      alert('Data imported successfully! '+deals.length+' deals loaded.');
    }catch(err){alert('Import failed — file may be corrupted.\n'+err);}
  };
  reader.readAsText(file);
}

function makeResizable(table){
  if(!table)return;
  table.querySelectorAll('th').forEach(th=>{
    th.style.position='relative';
    const old=th.querySelector('.rsz');if(old)old.remove();
    const r=document.createElement('div');
    r.className='rsz';
    r.style.cssText='position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;';
    r.addEventListener('mousedown',e=>{
      const startX=e.pageX,startW=th.offsetWidth;
      r.style.background='#185FA5';
      const move=e=>{th.style.width=Math.max(20,startW+e.pageX-startX)+'px';th.style.minWidth=th.style.width;};
      const up=()=>{r.style.background='';document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',move);
      document.addEventListener('mouseup',up);
      e.preventDefault();e.stopPropagation();
    });
    r.addEventListener('mouseover',()=>r.style.background='#93C5E8');
    r.addEventListener('mouseout',()=>r.style.background='');
    th.appendChild(r);
  });
}

function renderAll(){renderDashboard();renderDeals();renderInventory();renderGoals();makeResizable(document.querySelector("#tab-dashboard table"));makeResizable(document.querySelector("#tab-deals table"));}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');renderAll();}

populateSelects();
loadMonth('2026-04');
renderAll();
</script>
